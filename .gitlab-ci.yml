# Neutron OS — GitLab CI/CD Pipeline
#
# NeutronOS is a thin nuclear-domain extension layer on top of Axiom.
# Heavy lifting (signal pipeline, RAG, agents, migrations) is tested in Axiom's CI.
#
# Pipeline tiers by trigger:
#   Push to any branch  → preflight + unit tests + lint (if code changed)
#   MR opened/updated   → preflight + unit + lint + build wheel
#   Merge to main       → all tests + build + publish + mirror
#   Tag v* pushed       → all tests + build + publish stable release
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   GITLAB_TOKEN          — Personal access token for rsicc-gitlab.tacc.utexas.edu
#   GITHUB_TOKEN          — GitHub PAT with repo push access (for mirror:github job)
#   ANTHROPIC_API_KEY     — Powers LLM sensitivity review gate (mirror:review job)
#
# Runner setup:
#   If no shared runners are available on TACC GitLab, register your own:
#   gitlab-runner register --url https://rsicc-gitlab.tacc.utexas.edu \
#     --token <runner-token> --executor shell

stages:
  - preflight
  - test
  - build
  - publish
  - ai
  - mirror

# =============================================================================
# Variables
# =============================================================================

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  PYTHON_VERSION: "3.12"
  VENV_DIR: "$CI_PROJECT_DIR/.venv"

# =============================================================================
# Change-set anchors
# =============================================================================

.changes-code: &changes-code
  - src/**/*
  - tests/**/*
  - pyproject.toml
  - conftest.py
  - .gitlab-ci.yml

.changes-mirror: &changes-mirror
  - src/**/*
  - scripts/**/*
  - docs/**/*
  - tests/**/*
  - "*.md"
  - "*.toml"
  - .gitignore
  - .envrc
  - .gitlab-ci.yml

# =============================================================================
# Templates
# =============================================================================

.python-setup:
  image: python:${PYTHON_VERSION}-slim
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .pip-cache/
      - .venv/
  before_script:
    - python3 -m venv --without-pip "$VENV_DIR" || python3 -m venv "$VENV_DIR"
    - export PATH="$VENV_DIR/bin:$PATH"
    - curl -sS https://bootstrap.pypa.io/get-pip.py | python3
    - pip install --quiet --upgrade pip
    - pip install --quiet -e ".[all]"

# =============================================================================
# Preflight Stage
# =============================================================================

preflight:connections:
  stage: preflight
  image: python:3.12-slim
  variables:
    GITLAB_TOKEN: $GITLAB_TOKEN
    GITHUB_TOKEN: $GITHUB_TOKEN
  before_script:
    - pip install --quiet --break-system-packages requests
  script:
    - |
      python3 << 'EOF'
      import os, sys, requests

      PASS = "\033[32m✓\033[0m"
      FAIL = "\033[31m✗\033[0m"
      errors = []

      # --- GitLab token (required) ---
      token = os.environ.get("GITLAB_TOKEN", "")
      if not token:
          print(f"{FAIL} GITLAB_TOKEN not set")
          errors.append("GITLAB_TOKEN missing")
      else:
          r = requests.get(
              "https://rsicc-gitlab.tacc.utexas.edu/api/v4/user",
              headers={"PRIVATE-TOKEN": token}, timeout=10
          )
          if r.status_code == 200:
              print(f"{PASS} GitLab token valid (user: {r.json().get('username')})")
          else:
              print(f"{FAIL} GitLab token invalid (HTTP {r.status_code})")
              errors.append(f"GITLAB_TOKEN rejected: HTTP {r.status_code}")

      # --- GitHub token (required for mirror) ---
      gh_token = os.environ.get("GITHUB_TOKEN", "")
      if not gh_token:
          print(f"{FAIL} GITHUB_TOKEN not set")
          errors.append("GITHUB_TOKEN missing")
      else:
          r = requests.get(
              "https://api.github.com/repos/benjaminbooth/neutron-os-core",
              headers={"Authorization": f"Bearer {gh_token}", "Accept": "application/vnd.github+json"},
              timeout=10
          )
          if r.status_code == 200:
              print(f"{PASS} GitHub token valid (repo: {r.json().get('full_name')})")
          else:
              print(f"{FAIL} GitHub token invalid (HTTP {r.status_code})")
              errors.append(f"GITHUB_TOKEN rejected: HTTP {r.status_code}")

      if errors:
          print(f"\nPreflight failed: {len(errors)} required credential(s) invalid")
          sys.exit(1)
      else:
          print(f"\nAll required credentials verified.")
      EOF
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# =============================================================================
# Test Stage
# =============================================================================

test:unit:
  extends: .python-setup
  stage: test
  script:
    - pytest -v --tb=short -m "not integration"
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "push"
      changes: *changes-code

lint:
  extends: .python-setup
  stage: test
  script:
    - ruff check src/ --select E,F,W --ignore E501
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - src/**/*
        - .gitlab-ci.yml

# =============================================================================
# Build Stage
# =============================================================================

build:wheel:
  extends: .python-setup
  stage: build
  script:
    - pip install --quiet build
    - python -m build
    - ls -lh dist/
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *changes-code
    - if: $CI_MERGE_REQUEST_ID
      changes: *changes-code

# =============================================================================
# Publish Stage
# =============================================================================

publish:dev:
  extends: .python-setup
  stage: publish
  before_script:
    - python3 -m venv --without-pip "$VENV_DIR" || python3 -m venv "$VENV_DIR"
    - export PATH="$VENV_DIR/bin:$PATH"
    - curl -sS https://bootstrap.pypa.io/get-pip.py | python3
    - pip install --quiet --upgrade pip
    - pip install --quiet build twine
    - |
      python3 -c "
      import re, pathlib, os
      iid = os.environ.get('CI_PIPELINE_IID', '0')
      p = pathlib.Path('pyproject.toml')
      text = p.read_text()
      text = re.sub(r'version = \"([^\"]+)\"', lambda m: f'version = \"{m.group(1)}.dev{iid}\"', text, count=1)
      p.write_text(text)
      print(f'Stamped dev version')
      "
  script:
    - rm -rf dist/
    - python -m build
    - |
      TWINE_PASSWORD=${CI_JOB_TOKEN} \
      TWINE_USERNAME=gitlab-ci-token \
      python -m twine upload \
        --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi \
        dist/*
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

publish:release:
  extends: .python-setup
  stage: publish
  script:
    - pip install --quiet build twine
    - python -m build
    - |
      TWINE_PASSWORD=${CI_JOB_TOKEN} \
      TWINE_USERNAME=gitlab-ci-token \
      python -m twine upload \
        --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi \
        dist/*
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# AI Review Stage
# =============================================================================

claude:review:
  stage: ai
  image: node:24-alpine3.21
  before_script:
    - apk update
    - apk add --no-cache git curl bash
    - curl -fsSL https://claude.ai/install.sh | bash
  script:
    - /bin/gitlab-mcp-server || true
    - >
      claude
      -p "${AI_FLOW_INPUT:-'Review this MR for code quality, security issues, and adherence to project conventions defined in CLAUDE.md. Flag any concerns and suggest improvements.'}"
      --permission-mode acceptEdits
      --allowedTools "Bash Read Edit Write mcp__gitlab"
      --max-turns 10
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: '$CI_PIPELINE_SOURCE == "web"'
  timeout: 20 minutes
  allow_failure: true

# =============================================================================
# Mirror Stage — Push stripped copy to public GitHub mirror
# =============================================================================

mirror:github:
  stage: mirror
  image: python:3.12-slim
  needs: [preflight:connections]
  before_script:
    - pip install --quiet --break-system-packages git-filter-repo
    - git config --global user.email "ci@neutron-os"
    - git config --global user.name "Neutron OS CI"
  script:
    - GITHUB_REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/benjaminbooth/neutron-os-core.git"
    - git remote add github "$GITHUB_REMOTE_URL" || git remote set-url github "$GITHUB_REMOTE_URL"
    - bash scripts/push-public.sh --push --yes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *changes-mirror
  allow_failure: true
