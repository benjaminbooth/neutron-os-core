# Ollama Deployment for Local LLM Inference
# Used for local development to mirror production LLM setup

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          resources:
            requests:
              memory: 2Gi
              cpu: 500m
            limits:
              memory: 8Gi
              cpu: 4000m
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  labels:
    app: ollama
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-path

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: ollama

---
# Job to pull required models on startup
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-models
  labels:
    app: ollama
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait for Ollama to be ready
        - name: wait-for-ollama
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -q -O- http://ollama:11434/; do echo waiting for ollama; sleep 5; done']
      containers:
        - name: pull-models
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Pulling embedding model..."
              curl -X POST http://ollama:11434/api/pull -d '{"name": "nomic-embed-text"}'
              echo "Pulling LLM model..."
              curl -X POST http://ollama:11434/api/pull -d '{"name": "llama3.2:8b"}'
              echo "Models pulled successfully!"
