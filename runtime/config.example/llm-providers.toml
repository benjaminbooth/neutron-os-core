# LLM Provider Configuration
# Copy to runtime/config/llm-providers.toml and fill in your keys.
# (legacy name models.toml is still accepted)
#
# The gateway tries providers in priority order with automatic fallback.
# All providers must speak the OpenAI chat completions format.
#
# ── Routing fields ────────────────────────────────────────────────────────────
#
# routing_tier  (legacy binary — still honoured)
#   "public"            → safe for cloud LLMs, no VPN needed
#   "export_controlled" → VPN-gated, nuclear export-controlled queries only
#   "any"               → no restriction (default)
#
# routing_tags  (facility policy — additive, multiple providers can share tags)
#   A list of strings. The gateway matches providers whose tag set is a
#   superset of the tags requested by the caller.  Use for:
#     - routing to a specific private-network LLM by capability
#     - routing internal-only (non-EC) traffic away from the cloud
#     - any workflow-level policy beyond the binary EC tier
#
#   Common tags:
#     "private_network"   → any provider behind a VPN/intranet
#     "export_controlled" → mirrors routing_tier for tag-based callers
#     "internal_compute"  → facility intranet only, not export-controlled
#     "mcnp"              → provider tuned/vetted for MCNP-related work
#     "relap"             → provider for thermal-hydraulics / RELAP work
#     "multimodal"        → supports image inputs
#
# requires_vpn = true  → TCP reachability check before each call
#
# ─────────────────────────────────────────────────────────────────────────────

[gateway]
format = "openai"

