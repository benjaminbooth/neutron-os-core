# ── Private-network providers (VPN required) ─────────────────────────────────
# Each private-network provider declares requires_vpn = true so the gateway
# checks TCP reachability before attempting a call and falls back gracefully.
# Use routing_tags to distinguish between multiple private-network LLMs.

