# LLM Provider Configuration
# Copy to runtime/config/llm-providers.toml and fill in your keys.
# (legacy name models.toml is still accepted)
#
# The gateway tries providers in priority order with automatic fallback.
# All providers must speak the OpenAI chat completions format.
#
# ── Provider identity ─────────────────────────────────────────────────────────
#
# name  (REQUIRED, must be unique within this file)
#   The stable identifier for this provider. Used as the primary key in all
#   log records, audit trails, signal payloads, and cost attribution.
#
#   Rules:
#     • Must be unique — two providers cannot share a name (second is skipped)
#     • Should be stable — renaming a provider breaks historical log correlation
#     • Use descriptive, lowercase, hyphenated names that survive config changes
#
#   Good examples:  "anthropic-sonnet-primary", "qwen-tacc-ec", "llama-internal"
#   Bad examples:   "provider1", "test", "qwen" (not specific enough)
#
#   The gateway also computes two additional identity fields automatically —
#   you do not need to set these:
#     config_hash    8-char SHA-256 of (endpoint + model + routing_tier).
#                    Stable while config is unchanged. Changes on config drift.
#                    Appears in routing audit records so you can detect silent
#                    endpoint or model changes even if 'name' stays the same.
#     instance_id    UUID4 assigned at each Gateway startup. NOT stable across
#                    restarts — intentionally — so forensic traces can tell
#                    "provider loaded in the 2pm session" from "reloaded at 4pm
#                    after a config edit."
#
# ── Routing fields ────────────────────────────────────────────────────────────
#
# routing_tier  — three tiers
#   "public"            → safe for cloud LLMs, no VPN needed
#   "restricted"        → private-network LLM; non-EC nuclear content; falls back to cloud
#   "export_controlled" → TACC or equivalent EC-authorized environment only (future)
#   "any"               → no restriction (default)
#
# routing_tags  (facility policy — additive, multiple providers can share tags)
#   A list of strings. The gateway matches providers whose tag set is a
#   superset of the tags requested by the caller.  Use for:
#     - routing to a specific private-network LLM by capability
#     - routing internal-only (non-EC) traffic away from the cloud
#     - any workflow-level policy beyond the binary EC tier
#
#   Common tags:
#     "private_network"   → any provider behind a VPN/intranet
#     "export_controlled" → mirrors routing_tier for tag-based callers
#     "internal_compute"  → facility intranet only, not export-controlled
#     "mcnp"              → provider tuned/vetted for MCNP-related work
#     "relap"             → provider for thermal-hydraulics / RELAP work
#     "multimodal"        → supports image inputs
#
# requires_vpn = true  → TCP reachability check before each call
#
# ─────────────────────────────────────────────────────────────────────────────

[gateway]
format = "openai"

# ── Cloud / public providers ──────────────────────────────────────────────────

# [[gateway.providers]]
# name = "anthropic"
