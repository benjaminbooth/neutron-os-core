# ── Private-network providers (VPN required) ─────────────────────────────────
# Each private-network provider declares requires_vpn = true so the gateway
# checks TCP reachability before attempting a call and falls back gracefully.
# Use routing_tags to distinguish between multiple private-network LLMs.

# [[gateway.providers]]
# name = "qwen-rascal"
# endpoint = "https://rascal.austin.utexas.edu:41883/v1"  # UT VPN required
# model = "unsloth/Qwen3.5-122B-A10B-GGUF:Q4_K_M"        # 122B MoE / ~10B active, 256K ctx
# api_key_env = "RASCAL_API_KEY"                          # set to: rascal-llm700
# priority = 1
# routing_tier = "restricted"
# routing_tags = ["restricted", "private_network"]
# requires_vpn = true          # gateway does TCP check; skips if unreachable
# verify_ssl = false           # self-signed cert on rascal
# use_for = ["extraction", "synthesis", "fallback"]

