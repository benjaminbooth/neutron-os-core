{{- if .Values.ollama.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "neutron-os.fullname" . }}-ollama
  labels:
    {{- include "neutron-os.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  serviceName: {{ include "neutron-os.fullname" . }}-ollama
  replicas: 1
  selector:
    matchLabels:
      {{- include "neutron-os.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        {{- include "neutron-os.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ollama
    spec:
      {{- if .Values.ollama.gpu.enabled }}
      runtimeClassName: nvidia  # requires nvidia-container-runtime on host
      {{- end }}
      initContainers:
        # Pull the configured models before the server starts accepting traffic.
        # On restart, Ollama detects the model is already cached and skips download.
        - name: pull-models
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          command:
            - /bin/sh
            - -c
            - |
              ollama serve &
              SERVER_PID=$!
              sleep 5
              {{- range .Values.ollama.models }}
              echo "Pulling {{ . }}..."
              ollama pull {{ . }}
              {{- end }}
              kill $SERVER_PID
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 2Gi
              cpu: 2000m
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["ollama", "serve"]
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            {{- if .Values.ollama.gpu.enabled }}
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            {{- end }}
            {{- if .Values.ollama.keepAlive }}
            - name: OLLAMA_KEEP_ALIVE
              value: {{ .Values.ollama.keepAlive | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          {{- if .Values.ollama.gpu.enabled }}
          # GPU resource requests — requires nvidia device plugin in cluster
          # Rascal: nvidia.com/gpu: 1
            {{- if .Values.ollama.gpu.resources }}
            {{- /* already merged into resources above via values */ -}}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  {{- if .Values.ollama.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: models
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.ollama.persistence.storageClass }}
        storageClassName: {{ .Values.ollama.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.ollama.persistence.size }}
  {{- end }}
---
# ClusterIP service — internal cluster access (neut CLI uses NodePort below)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "neutron-os.fullname" . }}-ollama
  labels:
    {{- include "neutron-os.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "neutron-os.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
---
# NodePort service — exposes Ollama outside the cluster so the neut CLI
# on the developer's machine (or Ondrej's machine) can reach Qwen directly.
# Only deployed when ollama.externalAccess.enabled = true (Rascal, not local).
{{- if .Values.ollama.externalAccess.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "neutron-os.fullname" . }}-ollama-external
  labels:
    {{- include "neutron-os.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
    neut/access: external
spec:
  type: NodePort
  ports:
    - port: 11434
      targetPort: http
      protocol: TCP
      name: http
      nodePort: {{ .Values.ollama.externalAccess.nodePort }}
  selector:
    {{- include "neutron-os.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
{{- end }}
{{- end }}
