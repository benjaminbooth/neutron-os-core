# NeutronOS Helm Chart - Default Values
# Override for specific environments: values-local.yaml, values-stage.yaml, values-prod.yaml
#
# Extracted and adapted from docs/_tools/publisher/deploy/helm/publisher/
# as part of Publisher → Sense consolidation (Step 0)

# =============================================================================
# Global Configuration
# =============================================================================

nameOverride: ""
fullnameOverride: ""

# Environment: local, stage, prod
environment: local

# =============================================================================
# Image Configuration
# =============================================================================

image:
  pullPolicy: IfNotPresent
  pullSecrets: []

# Sense Server (THE agent - handles RAG, signal processing, media library)
signal:
  enabled: true
  image:
    repository: ghcr.io/neutron-os/signal
    tag: ""  # Defaults to Chart appVersion
  
  replicas: 1
  
  # Port configuration
  port: 8765  # WebSocket + HTTP
  
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 2Gi
      cpu: 1000m
  
  env:
    LOG_LEVEL: "INFO"
    PYTHONUNBUFFERED: "1"
  
  # Probes
  livenessProbe:
    httpGet:
      path: /status
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /status
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# API Gateway (REST endpoints, future)
api:
  enabled: false
  image:
    repository: ghcr.io/neutron-os/api
    tag: ""
  
  replicas: 2
  port: 8000
  
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

# =============================================================================
# PostgreSQL Configuration (pgvector)
# =============================================================================

postgresql:
  enabled: true
  
  # For local K3D: use bundled postgres
  # For production: set enabled=false and use external RDS
  
  image:
    repository: pgvector/pgvector
    tag: "pg16"
  
  auth:
    database: neut_db
    username: neut
    password: neut  # Override in production!
    postgresPassword: postgres  # Override in production!
  
  primary:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 500m
    
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""  # Use default
    
    # pgvector initialization
    initdb:
      scripts:
        init-pgvector.sql: |
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE EXTENSION IF NOT EXISTS pg_trgm;

# External database (when postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  database: neut_db
  username: neut
  # Password from secret
  existingSecret: ""
  secretKey: password

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # Inbox for raw signal files (voice memos, etc.)
  inbox:
    enabled: true
    size: 20Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  
  # Media library storage
  media:
    enabled: true
    size: 50Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

# =============================================================================
# Service Configuration
# =============================================================================

service:
  type: ClusterIP
  
  signal:
    port: 8765
  
  api:
    port: 8000

# =============================================================================
# Ingress Configuration
# =============================================================================

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt
  
  hosts:
    - host: neut.local
      paths:
        - path: /
          pathType: Prefix
          service: signal
  
  tls: []
  #  - secretName: neut-tls
  #    hosts:
  #      - neut.local

# =============================================================================
# Autoscaling
# =============================================================================

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# =============================================================================
# Pod Configuration
# =============================================================================

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # Sense needs to write to inbox
  capabilities:
    drop:
      - ALL

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  create: true
  annotations: {}
  name: ""

# =============================================================================
# Secrets
# =============================================================================

secrets:
  # Names of existing secrets
  database: ""  # Contains 'url' key with connection string
  llm: ""       # Contains 'api_key' for OpenAI/Anthropic

# =============================================================================
# Ollama — self-hosted LLM (disabled by default; enabled in values-rascal.yaml)
# =============================================================================

ollama:
  enabled: false

  image:
    repository: ollama/ollama
    tag: "latest"

  # Models to pull on first deploy (init container). Confirm tags via `ollama list`.
  models: []

  # How long to keep models loaded in VRAM. "-1" = forever. "0" = unload immediately.
  keepAlive: "5m"

  gpu:
    enabled: false

  resources:
    requests:
      memory: 2Gi
      cpu: 500m
    limits:
      memory: 8Gi
      cpu: 4000m

  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""

  # Expose Ollama outside the cluster via NodePort (for neut CLI access from host).
  # Disabled by default; enable in environment-specific values files.
  externalAccess:
    enabled: false
    nodePort: 31434

# =============================================================================
# LLM Configuration
# =============================================================================

llm:
  # Provider: openai, anthropic, local
  provider: openai
  
  # Model configuration
  model: gpt-4o-mini
  
  # For local LLM
  localEndpoint: ""
  
  # API key from secret (set secrets.llm)
  apiKeySecret: ""
