[project]
name = "neutron-os"
version = "0.1.0"
description = "Modular digital platform for nuclear facilities"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
docflow = ["python-docx>=1.1"]
sense = []
serve = []
chat = []
mcp = ["mcp>=1.0"]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
]
all = [
    "neutron-os[docflow,sense,serve,chat,mcp,dev]",
]

[project.scripts]
neut = "tools.neut_cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tools"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "integration: marks tests that hit external services (deselect with '-m \"not integration\"')",
    "gitlab: GitLab API integration",
    "onedrive: OneDrive / MS Graph integration",
    "teams: Teams transcript integration",
    "voice: Voice memo / sense serve integration",
    "inbox: Inbox note integration",
]

[tool.ruff]
target-version = "py311"
line-length = 100
