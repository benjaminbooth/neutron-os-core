# Alembic Configuration for Neut Sense Vector Database
#
# Usage:
#   neut sense db migrate upgrade head    # Apply all migrations
#   neut sense db migrate revision -m "add feature"  # Create new migration
#   neut sense db migrate current         # Show current revision
#   neut sense db migrate history         # Show migration history

[alembic]
# Path to migration scripts (relative to this file)
script_location = .

# Version location - single directory
version_locations = versions

# Output encoding
output_encoding = utf-8

# Template for new migrations
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate slug at this length
truncate_slug_length = 40

# Timezone for revision timestamps (UTC for consistency)
timezone = UTC

# Don't prepend date to version file paths
prepend_sys_path = .

[post_write_hooks]
# Run ruff on generated migrations
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
