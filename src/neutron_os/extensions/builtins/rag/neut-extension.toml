[extension]
name = "rag"
version = "0.1.0"
description = "RAG (Retrieval-Augmented Generation) index management — index, search, and sync the three-tier corpus"
builtin = true
kind = "tool"
module = "platform"

[[cli.commands]]
noun = "rag"
module = "neutron_os.extensions.builtins.rag.cli"

[[connections]]
name = "postgresql"
display_name = "PostgreSQL (pgvector)"
kind = "api"
endpoint = "localhost:5432"
credential_env_var = "NEUT_DB_URL"
health_check = "tcp_connect"
category = "data"
capabilities = ["read", "write"]
ensure_module = "neutron_os.extensions.builtins.rag.connections"
ensure_function = "ensure_postgresql_running"
