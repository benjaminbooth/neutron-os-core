[extension]
name = "prt"
version = "0.4.0"
description = "PR-T (Purty) — document lifecycle agent"
author = "NeutronOS"
builtin = true
kind = "agent"
module = "platform"
aliases = ["publisher", "prt"]
agent_identity = "AGENT.md"

[[cli.commands]]
noun = "pub"
module = "neutron_os.extensions.builtins.prt_agent.cli"
description = "Document publishing lifecycle"

[[cli.commands]]
noun = "doc"
module = "neutron_os.extensions.builtins.prt_agent.cli"
description = "Document publishing lifecycle (alias for pub)"

[[connections]]
name = "onedrive"
display_name = "Microsoft OneDrive"
kind = "api"
endpoint = "https://onedrive.live.com"
credential_env_var = "MS_GRAPH_CLIENT_ID"
credential_file = "onedrive/state.json"
category = "storage"
capabilities = ["read", "write"]
docs_url = "https://portal.azure.com/#view/Microsoft_AAD_RegisteredApps"

[[connections.auth_methods]]
method = "browser"
description = "Browser login (recommended — no API keys needed)"
endpoint = "https://onedrive.live.com"

[[connections.auth_methods]]
method = "graph_api"
credential_env_var = "MS_GRAPH_CLIENT_ID"
description = "MS Graph API (requires Azure developer credentials)"
docs_url = "https://portal.azure.com/#view/Microsoft_AAD_RegisteredApps"

[[connections.auth_methods]]
method = "manual"
description = "Manual file drop (no auth)"
