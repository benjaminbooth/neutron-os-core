[extension]
name = "prt"
version = "0.4.0"
description = "PR-T (Purty) — document lifecycle agent"
author = "NeutronOS"
builtin = true
kind = "agent"
module = "platform"
aliases = ["publisher", "prt"]
agent_identity = "AGENT.md"

[[cli.commands]]
noun = "pub"
module = "neutron_os.extensions.builtins.publisher.cli"
description = "Document publishing lifecycle"

[[cli.commands]]
noun = "doc"
module = "neutron_os.extensions.builtins.publisher.cli"
description = "Document publishing lifecycle (alias for pub)"
